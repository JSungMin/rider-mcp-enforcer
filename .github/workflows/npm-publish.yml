name: npm-publish (gamedev-log-analyzer)

# Publishes the gamedev-log-analyzer CLI/MCP package to npm so it can be used without an IDE
# (`npx -p gamedev-log-analyzer gamedev-log <cmd>` or `npm i -g gamedev-log-analyzer`).
# Trigger: a `gamedev-v*` tag (e.g. gamedev-v0.3.1) or a manual run. Requires an NPM_TOKEN secret.
on:
  workflow_dispatch:
  push:
    tags: ["gamedev-v*"]

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Sanity — CLI runs dependency-free
        working-directory: gamedev-log-analyzer/server
        run: node cli.js config
      - name: Publish to npm
        working-directory: gamedev-log-analyzer/server
        # Write the auth line into the package dir's .npmrc so `npm publish` finds the token even when
        # run from a subdirectory (setup-node's generated .npmrc isn't picked up here). npm never
        # publishes .npmrc, and the `files` allowlist excludes it.
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
